<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASSIS-MUSIC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Container principal (Sidebar + Conteúdo) -->
    <div class="container">
        
        <!-- Barra Lateral -->
        <nav class="sidebar">
            <h2 class="logo">ASSIS-MUSIC</h2>
            <ul class="menu">
                <li>🏠 Início</li>
                <li>🔍 Buscar</li>
                <li>📚 Sua Biblioteca</li>
            </ul>
        </nav>

        <!-- Área Principal -->
        <main class="main-content">
            <header class="topbar">
                <button class="btn-login">Entrar</button>
            </header>
            
            <section class="home-section">
                <h2>Boa noite</h2>
                <div class="cards-container">
                    <div class="card">
                        <div class="capa-album"></div>
                        <h3>Phonk Pesadão</h3>
                        <p>As melhores batidas.</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Player Fixo na Base -->
    <footer class="player">
        <div class="track-info">
            <h4>Nome da Faixa</h4>
            <p>Artista Desconhecido</p>
        </div>
        
        <div class="controls">
            <button class="btn-control">⏮️</button>
            <button class="btn-play">▶️</button>
            <button class="btn-control">⏭️</button>
        </div>
        
        <div class="volume-control">
            🔊 -------
        </div>
    </footer>
</body>
  </html>
